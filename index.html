<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Budget Journalier</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0d0f0e; --surface: #141614; --card: #1a1d1a; --border: #2a2e2a;
    --accent: #b8f55a; --accent-dim: #8ab53f; --red: #ff5a5a;
    --muted: #5a6359; --text: #e8ede8; --text-dim: #a0aba0;
  }
  .light {
    --bg: #f5f5f0; --surface: #ebebE4; --card: #ffffff; --border: #d8d8cc;
    --accent: #5a8f1a; --accent-dim: #4a7a12; --red: #d63030;
    --muted: #888880; --text: #1a1a18; --text-dim: #555550;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; min-height: 100vh; padding: 20px 16px 80px; overflow-x: hidden; transition: background 0.3s, color 0.3s; }

  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  header h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.8rem; letter-spacing: -0.03em; color: var(--accent); line-height: 1; }
  header p { color: var(--muted); font-size: 0.72rem; margin-bottom: 20px; letter-spacing: 0.08em; }
  .theme-btn { background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-size: 1.1rem; padding: 7px 11px; cursor: pointer; }

  .tabs { display: flex; gap: 0; background: var(--surface); border-radius: 10px; padding: 4px; margin-bottom: 16px; border: 1px solid var(--border); }
  .tab { flex: 1; background: none; border: none; border-radius: 7px; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 0.72rem; padding: 9px 4px; cursor: pointer; transition: background 0.15s, color 0.15s; letter-spacing: 0.04em; }
  .tab.active { background: var(--card); color: var(--accent); font-weight: 700; box-shadow: 0 1px 4px rgba(0,0,0,0.15); }

  .panel { display: none; }
  .panel.active { display: block; }

  .settings-panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; }
  .settings-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
  .settings-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
  .settings-row:last-child { margin-bottom: 0; }
  .settings-label { font-size: 0.68rem; color: var(--muted); width: 90px; flex-shrink: 0; }
  .settings-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.85rem; font-weight: 700; padding: 8px 10px; outline: none; transition: border-color 0.15s; }
  .settings-input:focus { border-color: var(--accent); }
  .currency-btns { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
  .currency-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text-dim); font-family: 'Space Mono', monospace; font-size: 0.8rem; padding: 6px 10px; cursor: pointer; transition: all 0.15s; }
  .currency-btn.active { border-color: var(--accent); color: var(--accent); background: #1e2a1a; }
  .light .currency-btn.active { background: #e8f5d8; }

  .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 4px; }
  .cat-chip { display: flex; align-items: center; gap: 5px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 8px; font-size: 0.68rem; color: var(--text-dim); cursor: pointer; transition: all 0.15s; }
  .cat-chip.active { border-color: var(--accent); color: var(--accent); }
  .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .summary-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .summary-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .summary-card .label { font-size: 0.62rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  .summary-card .value { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.3rem; color: var(--accent); }
  .summary-card .value.negative { color: var(--red); }

  .top-btns { display: flex; gap: 8px; margin-bottom: 12px; }
  .add-day-btn { flex: 1; background: var(--accent); color: #0d0f0e; border: none; border-radius: 10px; padding: 13px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; cursor: pointer; }
  .undo-btn { background: none; border: 1px solid var(--border); border-radius: 10px; color: var(--muted); font-size: 1.15rem; padding: 13px 18px; cursor: pointer; }
  .undo-btn:disabled { opacity: 0.25; cursor: not-allowed; }

  .swipe-hint { text-align: center; font-size: 0.6rem; color: var(--muted); letter-spacing: 0.06em; margin-bottom: 16px; opacity: 0.6; }

  .swipe-wrapper { position: relative; margin-bottom: 14px; border-radius: 12px; overflow: hidden; }
  .swipe-delete-bg { position: absolute; inset: 0; background: var(--red); display: flex; align-items: center; justify-content: flex-end; padding-right: 22px; border-radius: 12px; color: #fff; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.82rem; }
  .swipe-content { position: relative; z-index: 1; border-radius: 12px; will-change: transform; transition: transform 0.22s ease; }
  .day-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .day-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px 8px; border-bottom: 1px solid var(--border); }
  .day-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; color: var(--text); }
  .day-title span { display: block; font-family: 'Space Mono', monospace; font-size: 0.62rem; color: var(--muted); font-weight: 400; margin-top: 1px; }
  .day-balance { text-align: right; }
  .day-balance .bal-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; }
  .bal-value { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.15rem; }
  .bal-value.positive { color: var(--accent); }
  .bal-value.negative { color: var(--red); }

  .day-budget-row { display: flex; align-items: center; gap: 8px; padding: 6px 16px; border-bottom: 1px solid var(--border); }
  .day-budget-label { font-size: 0.62rem; color: var(--muted); flex: 1; }
  .day-budget-input { width: 110px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--accent); font-family: 'Space Mono', monospace; font-size: 0.78rem; font-weight: 700; padding: 5px 8px; outline: none; text-align: right; transition: border-color 0.15s; }
  .day-budget-input:focus { border-color: var(--accent); }
  .day-budget-reset { background: none; border: none; color: var(--muted); font-size: 0.65rem; cursor: pointer; font-family: 'Space Mono', monospace; }

  .day-meta { display: flex; padding: 6px 16px; font-size: 0.68rem; color: var(--muted); border-bottom: 1px solid var(--border); }
  .day-meta .meta-item { flex: 1; }
  .day-meta .meta-item strong { display: block; color: var(--text-dim); font-size: 0.75rem; }

  .progress-bar-wrap { height: 3px; background: var(--border); margin: 0 16px 10px; border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; }

  .expenses-list { padding: 6px 16px 8px; }

  .exp-swipe-wrapper { position: relative; margin-bottom: 8px; border-radius: 7px; overflow: hidden; }
  .exp-delete-bg { position: absolute; inset: 0; background: var(--red); display: flex; align-items: center; justify-content: flex-end; padding-right: 14px; border-radius: 7px; color: #fff; font-size: 0.72rem; font-family: 'Syne', sans-serif; font-weight: 700; }
  .exp-swipe-content { position: relative; z-index: 1; display: flex; align-items: center; gap: 6px; will-change: transform; transition: transform 0.22s ease; background: var(--surface); border-radius: 7px; padding: 2px; border: 1px solid var(--border); }
  .exp-cat-dot { width: 10px; height: 10px; border-radius: 50%; margin-left: 8px; flex-shrink: 0; cursor: pointer; }
  .exp-swipe-content input[type="text"] { flex: 1; background: transparent; border: none; color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.75rem; padding: 8px 6px; outline: none; min-width: 0; }
  .exp-swipe-content input[type="number"] { width: 82px; background: transparent; border: none; color: var(--accent); font-family: 'Space Mono', monospace; font-size: 0.8rem; font-weight: 700; padding: 8px 6px; outline: none; text-align: right; }
  .exp-swipe-content input::placeholder { color: var(--muted); }

  .add-expense-btn { width: 100%; background: none; border: 1px dashed var(--border); border-radius: 7px; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 0.72rem; padding: 9px; cursor: pointer; margin-top: 4px; }

  .day-footer { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px 12px; border-top: 1px solid var(--border); }
  .day-footer .total-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; }
  .day-footer .total-val { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; color: var(--red); }
  .reset-day-btn { background: none; border: none; color: var(--muted); font-size: 0.62rem; cursor: pointer; text-transform: uppercase; font-family: 'Space Mono', monospace; }

  .rollover-badge { display: inline-block; background: #1e2a1a; border: 1px solid var(--accent-dim); color: var(--accent); font-size: 0.58rem; border-radius: 4px; padding: 2px 5px; margin-left: 6px; vertical-align: middle; }
  .rollover-badge.neg { background: #2a1a1a; border-color: var(--red); color: var(--red); }
  .light .rollover-badge { background: #e8f5d8; }
  .light .rollover-badge.neg { background: #fde8e8; }

  .cat-popup { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 500; align-items: flex-end; }
  .cat-popup.open { display: flex; }
  .cat-popup-inner { background: var(--card); border-radius: 16px 16px 0 0; padding: 20px 16px 36px; width: 100%; }
  .cat-popup-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; margin-bottom: 16px; color: var(--text); }
  .cat-popup-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .cat-popup-item { display: flex; flex-direction: column; align-items: center; gap: 6px; background: var(--surface); border: 2px solid var(--border); border-radius: 10px; padding: 12px 8px; cursor: pointer; transition: all 0.15s; }
  .cat-popup-item.selected { border-color: var(--accent); }
  .cat-popup-emoji { font-size: 1.4rem; }
  .cat-popup-name { font-size: 0.65rem; color: var(--text-dim); text-align: center; }
  .cat-popup-close { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-top: 14px; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 0.8rem; cursor: pointer; }

  .recap-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 14px; }
  .recap-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; color: var(--text); margin-bottom: 12px; }
  .recap-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.75rem; }
  .recap-row:last-child { border-bottom: none; }
  .recap-row .rr-label { color: var(--muted); }
  .recap-row .rr-val { font-family: 'Syne', sans-serif; font-weight: 700; color: var(--text); }
  .recap-row .rr-val.positive { color: var(--accent); }
  .recap-row .rr-val.negative { color: var(--red); }
  .cat-bar-wrap { margin-top: 14px; }
  .cat-bar-label { display: flex; justify-content: space-between; font-size: 0.68rem; color: var(--muted); margin-bottom: 4px; }
  .cat-bar-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
  .cat-bar-fill { height: 100%; border-radius: 3px; }
  .no-data { text-align: center; color: var(--muted); font-size: 0.8rem; padding: 30px 0; }

  .undo-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--accent); color: #0d0f0e; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8rem; padding: 10px 20px; border-radius: 20px; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 999; white-space: nowrap; }
  .undo-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="top-bar">
  <header><h1>予算 BUDGET</h1></header>
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
</div>
<header><p id="header-sub">BASE JOURNALIÈRE · 3,800 ¥</p></header>

<div class="tabs">
  <button class="tab active" onclick="showTab('budget')">💰 Budget</button>
  <button class="tab" onclick="showTab('recap')">📊 Récap</button>
  <button class="tab" onclick="showTab('settings')">⚙ Réglages</button>
</div>

<div class="panel active" id="tab-budget">
  <div class="summary-bar">
    <div class="summary-card">
      <div class="label">Total dépensé</div>
      <div class="value" id="totalSpent">0</div>
    </div>
    <div class="summary-card">
      <div class="label">Solde global</div>
      <div class="value" id="globalBalance">0</div>
    </div>
  </div>
  <div class="top-btns">
    <button class="add-day-btn" onclick="addDay()">＋ Nouveau jour</button>
    <button class="undo-btn" id="undoBtn" onclick="undo()" disabled>↩</button>
  </div>
  <p class="swipe-hint">← Glisser à gauche pour supprimer</p>
  <div id="days-container"></div>
</div>

<div class="panel" id="tab-recap">
  <div id="recap-container"></div>
</div>

<div class="panel" id="tab-settings">
  <div class="settings-panel">
    <div class="settings-title">Budget & Devise</div>
    <div class="settings-row">
      <div class="settings-label">Budget / jour</div>
      <input class="settings-input" type="number" id="budgetInput" value="3800" min="1" step="1" oninput="updateSettings()">
    </div>
    <div class="settings-row">
      <div class="settings-label">Devise</div>
      <div class="currency-btns">
        <button class="currency-btn active" onclick="setCurrency('¥')">¥</button>
        <button class="currency-btn" onclick="setCurrency('€')">€</button>
        <button class="currency-btn" onclick="setCurrency('$')">$</button>
        <button class="currency-btn" onclick="setCurrency('£')">£</button>
        <button class="currency-btn" onclick="setCurrency('฿')">฿</button>
        <input class="settings-input" type="text" id="customCurrency" placeholder="Autre…" maxlength="5" style="width:80px;flex:none;" oninput="setCurrency(this.value)">
      </div>
    </div>
  </div>
  <div class="settings-panel">
    <div class="settings-title">Catégories</div>
    <div class="cat-grid" id="catGrid"></div>
  </div>
</div>

<div class="cat-popup" id="catPopup">
  <div class="cat-popup-inner">
    <div class="cat-popup-title">Choisir une catégorie</div>
    <div class="cat-popup-grid" id="catPopupGrid"></div>
    <button class="cat-popup-close" onclick="closeCatPopup()">Fermer</button>
  </div>
</div>

<div class="undo-toast" id="undoToast"></div>

<script>
  const ALL_CATS = [
    { id: 'food',      emoji: '🍱', name: 'Nourriture', color: '#f5a623' },
    { id: 'drink',     emoji: '🧋', name: 'Boissons',   color: '#5bc4f5' },
    { id: 'transport', emoji: '🚃', name: 'Transport',  color: '#b8f55a' },
    { id: 'shop',      emoji: '🛍', name: 'Shopping',   color: '#f55adc' },
    { id: 'health',    emoji: '💊', name: 'Santé',      color: '#5af5c4' },
    { id: 'fun',       emoji: '🎉', name: 'Loisirs',    color: '#a05af5' },
    { id: 'beauty',    emoji: '💅', name: 'Beauté',     color: '#f55a7a' },
    { id: 'home',      emoji: '🏠', name: 'Maison',     color: '#f5e35a' },
    { id: 'other',     emoji: '📦', name: 'Autre',      color: '#888' },
  ];
  function getCat(id) { return ALL_CATS.find(c => c.id === id) || ALL_CATS[ALL_CATS.length-1]; }

  let DAILY_BASE = 3800, CURRENCY = '¥', isDark = true;
  let days = [], history = [];
  const MAX_HISTORY = 30;
  let catPickerCallback = null;

  function fmt(n) { return Math.abs(n).toLocaleString('fr-FR') + ' ' + CURRENCY; }

  function toggleTheme() {
    isDark = !isDark;
    document.body.classList.toggle('light', !isDark);
    document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
    saveSettings();
  }

  function showTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['budget','recap','settings'][i]===tab));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-'+tab).classList.add('active');
    if (tab==='recap') renderRecap();
    if (tab==='settings') renderCatGrid();
  }

  function updateSettings() {
    const val = parseInt(document.getElementById('budgetInput').value);
    if (val > 0) DAILY_BASE = val;
    saveSettings();
    document.getElementById('header-sub').textContent = 'BASE JOURNALIÈRE · ' + fmt(DAILY_BASE);
    renderSummaryAndBars();
  }

  function setCurrency(c) {
    if (!c||!c.trim()) return;
    CURRENCY = c.trim();
    document.querySelectorAll('.currency-btn').forEach(b => b.classList.toggle('active', b.textContent===CURRENCY));
    saveSettings();
    document.getElementById('header-sub').textContent = 'BASE JOURNALIÈRE · ' + fmt(DAILY_BASE);
    renderSummaryAndBars();
  }

  function renderCatGrid() {
    const grid = document.getElementById('catGrid');
    grid.innerHTML = '';
    ALL_CATS.forEach(cat => {
      const chip = document.createElement('div');
      chip.className = 'cat-chip active';
      chip.innerHTML = `<div class="cat-dot" style="background:${cat.color}"></div>${cat.emoji} ${cat.name}`;
      grid.appendChild(chip);
    });
  }

  function saveSettings() {
    try { localStorage.setItem('budget_settings', JSON.stringify({base:DAILY_BASE,currency:CURRENCY,dark:isDark})); } catch(e) {}
  }

  function loadSettings() {
    try {
      const s = localStorage.getItem('budget_settings');
      if (s) {
        const p = JSON.parse(s);
        if (p.base) DAILY_BASE = p.base;
        if (p.currency) CURRENCY = p.currency;
        if (p.dark===false) { isDark=false; document.body.classList.add('light'); document.getElementById('themeBtn').textContent='☀️'; }
        document.getElementById('budgetInput').value = DAILY_BASE;
        document.querySelectorAll('.currency-btn').forEach(b => b.classList.toggle('active', b.textContent===CURRENCY));
        if (!['¥','€','$','£','฿'].includes(CURRENCY)) document.getElementById('customCurrency').value = CURRENCY;
        document.getElementById('header-sub').textContent = 'BASE JOURNALIÈRE · ' + fmt(DAILY_BASE);
      }
    } catch(e) {}
  }

  function snapshot(label) {
    history.push({state:JSON.stringify(days),label});
    if (history.length>MAX_HISTORY) history.shift();
    updateUndoBtn();
  }
  function undo() {
    if (!history.length) return;
    const prev = history.pop();
    days = JSON.parse(prev.state);
    saveData(); render(); updateUndoBtn();
    showToast('Annulé : '+prev.label);
  }
  function updateUndoBtn() { document.getElementById('undoBtn').disabled = !history.length; }
  function showToast(msg) {
    const t = document.getElementById('undoToast');
    t.textContent=msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2200);
  }
  document.addEventListener('keydown', e => { if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();} });

  function loadData() {
    try { const s=localStorage.getItem('budget_days'); if(s) days=JSON.parse(s); } catch(e) {}
    if (!days.length) { days.push({expenses:[],customBudget:null}); saveData(); }
    days.forEach(d => { if(d.customBudget===undefined) d.customBudget=null; });
  }
  function saveData() { try { localStorage.setItem('budget_days',JSON.stringify(days)); } catch(e) {} }

  function getDayLabel(i) {
    const d=new Date(); d.setDate(d.getDate()-(days.length-1-i));
    return d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'short'});
  }
  function getDayTotal(i) { return days[i].expenses.reduce((s,e)=>s+(parseFloat(e.amount)||0),0); }
  function getDayBase(i) { return days[i].customBudget!==null ? days[i].customBudget : DAILY_BASE; }
  function getDayBudget(i) { if(i===0) return getDayBase(i); return getDayBudget(i-1)-getDayTotal(i-1)+getDayBase(i); }

  function addDay() { snapshot('Ajout jour '+(days.length+1)); days.push({expenses:[],customBudget:null}); saveData(); render(); }
  function deleteDay(i) { if(days.length===1)return; snapshot('Suppression jour '+(i+1)); days.splice(i,1); saveData(); render(); }
  function resetDay(i) { if(!days[i].expenses.length)return; snapshot('Reset jour '+(i+1)); days[i].expenses=[]; saveData(); render(); }
  function setDayBudget(i,val) { const n=parseFloat(val); days[i].customBudget=(val===''||isNaN(n))?null:n; saveData(); renderSummaryAndBars(); }
  function resetDayBudget(i) { days[i].customBudget=null; const inp=document.querySelector(`.day-card[data-day="${i}"] .day-budget-input`); if(inp)inp.value=''; saveData(); renderSummaryAndBars(); }
  function addExpense(i) {
    snapshot('Ajout dépense J'+(i+1));
    days[i].expenses.push({label:'',amount:'',cat:'other'}); saveData(); render();
    setTimeout(()=>{ const rows=document.querySelectorAll(`.day-card[data-day="${i}"] .exp-swipe-wrapper`); const last=rows[rows.length-1]; if(last)last.querySelector('input[type="text"]').focus(); },50);
  }
  function deleteExpense(di,ei) { const exp=days[di].expenses[ei]; snapshot('Suppression "'+(exp.label||exp.amount+' '+CURRENCY)+'"'); days[di].expenses.splice(ei,1); saveData(); render(); }
  function updateExpense(di,ei,field,val) { days[di].expenses[ei][field]=val; saveData(); renderSummaryAndBars(); }

  function openCatPopup(di,ei) {
    catPickerCallback=(catId)=>{ days[di].expenses[ei].cat=catId; saveData(); render(); };
    const grid=document.getElementById('catPopupGrid'); grid.innerHTML='';
    ALL_CATS.forEach(cat=>{
      const item=document.createElement('div');
      item.className='cat-popup-item'+(days[di].expenses[ei].cat===cat.id?' selected':'');
      item.innerHTML=`<div class="cat-popup-emoji">${cat.emoji}</div><div class="cat-popup-name">${cat.name}</div>`;
      item.style.borderColor=days[di].expenses[ei].cat===cat.id?cat.color:'';
      item.onclick=()=>{ catPickerCallback(cat.id); closeCatPopup(); };
      grid.appendChild(item);
    });
    document.getElementById('catPopup').classList.add('open');
  }
  function closeCatPopup() { document.getElementById('catPopup').classList.remove('open'); }

  function addSwipe(el,threshold,onDelete) {
    const content=el.querySelector('.swipe-content,.exp-swipe-content');
    let startX=0,startY=0,swiping=false,confirmed=false,moved=false;
    el.addEventListener('touchstart',e=>{ startX=e.touches[0].clientX; startY=e.touches[0].clientY; swiping=false; confirmed=false; moved=false; },{passive:true});
    el.addEventListener('touchmove',e=>{
      const dx=e.touches[0].clientX-startX, dy=e.touches[0].clientY-startY;
      if(!moved){ if(Math.abs(dx)<4&&Math.abs(dy)<4)return; if(Math.abs(dy)>Math.abs(dx))return; swiping=true; moved=true; }
      if(!swiping)return;
      const clamped=Math.max(-(threshold+40),Math.min(0,dx));
      content.style.transition='none'; content.style.transform=`translateX(${clamped}px)`;
      confirmed=dx<-(threshold*0.55);
    },{passive:true});
    el.addEventListener('touchend',()=>{
      if(!swiping)return;
      content.style.transition='transform 0.22s ease';
      if(confirmed){ content.style.transform=`translateX(-${threshold+80}px)`; setTimeout(onDelete,220); }
      else { content.style.transform='translateX(0)'; }
    });
  }

  function renderSummaryAndBars() {
    let totalSpent=0; days.forEach((d,i)=>totalSpent+=getDayTotal(i));
    const globalBal=days.reduce((s,d,i)=>s+getDayBase(i),0)-totalSpent;
    document.getElementById('totalSpent').textContent=fmt(totalSpent);
    const gbEl=document.getElementById('globalBalance');
    gbEl.textContent=(globalBal>=0?'+':'-')+fmt(Math.abs(globalBal));
    gbEl.className='value'+(globalBal<0?' negative':'');
    days.forEach((d,i)=>{
      const budget=getDayBudget(i),spent=getDayTotal(i),balance=budget-spent;
      const pct=Math.min(100,Math.max(0,(spent/(budget||1))*100));
      const card=document.querySelector(`.day-card[data-day="${i}"]`); if(!card)return;
      card.querySelector('.bal-value').textContent=(balance>=0?'+':'-')+fmt(Math.abs(balance));
      card.querySelector('.bal-value').className='bal-value '+(balance>=0?'positive':'negative');
      card.querySelector('.progress-bar-fill').style.cssText=`width:${pct}%;background:${pct>90?'#ff5a5a':pct>65?'#f5a623':'#b8f55a'}`;
      card.querySelector('.meta-budget').textContent=fmt(budget);
      card.querySelector('.meta-spent').textContent=fmt(spent);
      card.querySelector('.total-val').textContent='-'+fmt(spent);
      const rb=card.querySelector('.rollover-amount');
      if(rb&&i>0){ const pb=getDayBudget(i-1)-getDayTotal(i-1); rb.textContent=(pb>=0?'+':'-')+fmt(Math.abs(pb)); rb.className='rollover-badge rollover-amount'+(pb<0?' neg':''); }
      const bi=card.querySelector('.day-budget-input');
      if(bi&&document.activeElement!==bi){ bi.placeholder=fmt(getDayBase(i))+' (défaut)'; if(d.customBudget!==null)bi.value=d.customBudget; }
    });
  }

  function renderRecap() {
    const container=document.getElementById('recap-container');
    if(!days.length||days.every(d=>!d.expenses.length)){ container.innerHTML='<div class="no-data">Aucune dépense enregistrée</div>'; return; }
    const weeks=[]; for(let i=0;i<days.length;i+=7) weeks.push(days.slice(i,i+7).map((d,j)=>({...d,idx:i+j})));
    container.innerHTML='';
    weeks.reverse().forEach((week,wi)=>{
      const card=document.createElement('div'); card.className='recap-card';
      const totalBase=week.reduce((s,d)=>s+getDayBase(d.idx),0);
      const totalSpent=week.reduce((s,d)=>s+getDayTotal(d.idx),0);
      const balance=totalBase-totalSpent;
      const catTotals={};
      week.forEach(d=>d.expenses.forEach(e=>{ const cat=e.cat||'other'; catTotals[cat]=(catTotals[cat]||0)+(parseFloat(e.amount)||0); }));
      let html=`<div class="recap-title">Semaine ${weeks.length-wi}</div>`;
      html+=`<div class="recap-row"><span class="rr-label">Jours</span><span class="rr-val">${week.length}</span></div>`;
      html+=`<div class="recap-row"><span class="rr-label">Budget total</span><span class="rr-val">${fmt(totalBase)}</span></div>`;
      html+=`<div class="recap-row"><span class="rr-label">Dépensé</span><span class="rr-val">${fmt(totalSpent)}</span></div>`;
      html+=`<div class="recap-row"><span class="rr-label">Solde</span><span class="rr-val ${balance>=0?'positive':'negative'}">${balance>=0?'+':'-'}${fmt(Math.abs(balance))}</span></div>`;
      html+=`<div class="recap-row"><span class="rr-label">Moy. / jour</span><span class="rr-val">${fmt(totalSpent/week.length)}</span></div>`;
      if(Object.keys(catTotals).length){
        html+='<div class="cat-bar-wrap">';
        Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).forEach(([catId,amt])=>{
          const cat=getCat(catId); const pct=totalSpent>0?Math.round((amt/totalSpent)*100):0;
          html+=`<div class="cat-bar-label"><span>${cat.emoji} ${cat.name}</span><span>${fmt(amt)} · ${pct}%</span></div>`;
          html+=`<div class="cat-bar-track"><div class="cat-bar-fill" style="width:${pct}%;background:${cat.color}"></div></div>`;
        });
        html+='</div>';
      }
      card.innerHTML=html; container.appendChild(card);
    });
  }

  function render() {
    const container=document.getElementById('days-container'); container.innerHTML='';
    days.forEach((day,di)=>{
      const budget=getDayBudget(di),spent=getDayTotal(di),balance=budget-spent;
      const pct=Math.min(100,Math.max(0,(spent/(budget||1))*100));
      const prevBal=di>0?getDayBudget(di-1)-getDayTotal(di-1):0;
      const wrap=document.createElement('div'); wrap.className='swipe-wrapper';
      const bg=document.createElement('div'); bg.className='swipe-delete-bg'; bg.textContent='🗑 Supprimer';
      const sc=document.createElement('div'); sc.className='swipe-content';
      const card=document.createElement('div'); card.className='day-card'; card.dataset.day=di;
      const rolloverHTML=di>0?`<span class="rollover-badge rollover-amount${prevBal<0?' neg':''}">${prevBal>=0?'+':'-'}${fmt(Math.abs(prevBal))}</span>`:'';
      card.innerHTML=`
        <div class="day-header">
          <div class="day-title">Jour ${di+1}${rolloverHTML}<span>${getDayLabel(di)}</span></div>
          <div class="day-balance"><div class="bal-label">Solde</div><div class="bal-value ${balance>=0?'positive':'negative'}">${balance>=0?'+':'-'}${fmt(Math.abs(balance))}</div></div>
        </div>
        <div class="day-budget-row">
          <span class="day-budget-label">Budget du jour</span>
          <input class="day-budget-input" type="number" min="0" step="1" placeholder="${fmt(getDayBase(di))} (défaut)" value="${day.customBudget!==null?day.customBudget:''}" oninput="setDayBudget(${di},this.value)" />
          <button class="day-budget-reset" onclick="resetDayBudget(${di})">✕</button>
        </div>
        <div class="day-meta">
          <div class="meta-item">Budget<strong class="meta-budget">${fmt(budget)}</strong></div>
          <div class="meta-item">Dépensé<strong class="meta-spent">${fmt(spent)}</strong></div>
        </div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%;background:${pct>90?'#ff5a5a':pct>65?'#f5a623':'#b8f55a'}"></div></div>
        <div class="expenses-list" id="exp-list-${di}"></div>
        <div class="day-footer">
          <div><div class="total-label">Total dépensé</div><div class="total-val">-${fmt(spent)}</div></div>
          <button class="reset-day-btn" onclick="resetDay(${di})">⟳ Remettre à zéro</button>
        </div>`;
      sc.appendChild(card); wrap.appendChild(bg); wrap.appendChild(sc); container.appendChild(wrap);
      if(days.length>1) addSwipe(wrap,110,()=>deleteDay(di));
      const expList=card.querySelector('#exp-list-'+di);
      day.expenses.forEach((exp,ei)=>{
        const cat=getCat(exp.cat||'other');
        const ew=document.createElement('div'); ew.className='exp-swipe-wrapper';
        const ebg=document.createElement('div'); ebg.className='exp-delete-bg'; ebg.textContent='🗑 Suppr.';
        const ec=document.createElement('div'); ec.className='exp-swipe-content';
        ec.innerHTML=`<div class="exp-cat-dot" style="background:${cat.color}" title="${cat.name}" onclick="openCatPopup(${di},${ei})"></div><input type="text" placeholder="Libellé..." value="${exp.label.replace(/"/g,'&quot;')}" oninput="days[${di}].expenses[${ei}].label=this.value;saveData();" /><input type="number" placeholder="${CURRENCY}" value="${exp.amount}" oninput="updateExpense(${di},${ei},'amount',this.value);" min="0" step="1" />`;
        ew.appendChild(ebg); ew.appendChild(ec); expList.appendChild(ew);
        addSwipe(ew,80,()=>deleteExpense(di,ei));
      });
      const addBtn=document.createElement('button'); addBtn.className='add-expense-btn'; addBtn.textContent='+ Ajouter une dépense'; addBtn.onclick=()=>addExpense(di); expList.appendChild(addBtn);
    });
    renderSummaryAndBars();
  }

  loadSettings(); loadData(); render();
</script>
</body>
</html>
