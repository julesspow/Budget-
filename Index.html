<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Budget Journalier</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0d0f0e;
    --surface: #141614;
    --card: #1a1d1a;
    --border: #2a2e2a;
    --accent: #b8f55a;
    --accent-dim: #8ab53f;
    --red: #ff5a5a;
    --muted: #5a6359;
    --text: #e8ede8;
    --text-dim: #a0aba0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    padding: 20px 16px 60px;
    overflow-x: hidden;
  }

  header { text-align: center; margin-bottom: 24px; }
  header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2rem;
    letter-spacing: -0.03em;
    color: var(--accent);
    line-height: 1;
  }
  header p { color: var(--muted); font-size: 0.72rem; margin-top: 6px; letter-spacing: 0.08em; }

  .summary-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .summary-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .summary-card .label { font-size: 0.62rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  .summary-card .value { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.4rem; color: var(--accent); }
  .summary-card .value.negative { color: var(--red); }

  .top-btns { display: flex; gap: 8px; margin-bottom: 12px; }

  .add-day-btn {
    flex: 1;
    background: var(--accent);
    color: #0d0f0e;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .add-day-btn:hover { opacity: 0.85; }

  .undo-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-size: 1.15rem;
    padding: 13px 18px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .undo-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .undo-btn:disabled { opacity: 0.25; cursor: not-allowed; }

  .swipe-hint { text-align: center; font-size: 0.6rem; color: var(--muted); letter-spacing: 0.06em; margin-bottom: 16px; opacity: 0.6; }

  /* ── SWIPEABLE DAY ── */
  .swipe-wrapper {
    position: relative;
    margin-bottom: 14px;
    border-radius: 12px;
    overflow: hidden;
  }

  .swipe-delete-bg {
    position: absolute;
    inset: 0;
    background: var(--red);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 22px;
    border-radius: 12px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.82rem;
    letter-spacing: 0.04em;
  }

  .swipe-content {
    position: relative;
    z-index: 1;
    border-radius: 12px;
    will-change: transform;
    transition: transform 0.22s ease;
  }

  /* ── DAY CARD ── */
  .day-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .day-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }

  .day-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; color: var(--text); }
  .day-title span { display: block; font-family: 'Space Mono', monospace; font-size: 0.62rem; color: var(--muted); font-weight: 400; margin-top: 1px; letter-spacing: 0.06em; }

  .day-balance { text-align: right; }
  .day-balance .bal-label { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .day-balance .bal-value { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.2rem; }
  .bal-value.positive { color: var(--accent); }
  .bal-value.negative { color: var(--red); }

  .day-meta { display: flex; padding: 8px 16px; font-size: 0.68rem; color: var(--muted); border-bottom: 1px solid var(--border); }
  .day-meta .meta-item { flex: 1; }
  .day-meta .meta-item strong { display: block; color: var(--text-dim); font-size: 0.75rem; }

  .progress-bar-wrap { height: 3px; background: var(--border); margin: 0 16px 12px; border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; }

  .expenses-list { padding: 6px 16px 10px; }

  /* ── SWIPEABLE EXPENSE ── */
  .exp-swipe-wrapper {
    position: relative;
    margin-bottom: 8px;
    border-radius: 7px;
    overflow: hidden;
  }

  .exp-delete-bg {
    position: absolute;
    inset: 0;
    background: var(--red);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 14px;
    border-radius: 7px;
    color: #fff;
    font-size: 0.72rem;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
  }

  .exp-swipe-content {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 8px;
    will-change: transform;
    transition: transform 0.22s ease;
    animation: fadeIn 0.2s ease;
  }

  .exp-swipe-content input[type="text"] {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    padding: 9px 10px;
    outline: none;
    transition: border-color 0.15s;
    min-width: 0;
  }

  .exp-swipe-content input[type="number"] {
    width: 88px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    padding: 9px 8px;
    outline: none;
    text-align: right;
    transition: border-color 0.15s;
  }

  .exp-swipe-content input:focus { border-color: var(--accent); }
  .exp-swipe-content input::placeholder { color: var(--muted); }

  .add-expense-btn {
    width: 100%;
    background: none;
    border: 1px dashed var(--border);
    border-radius: 7px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    padding: 9px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    margin-top: 4px;
  }
  .add-expense-btn:hover { border-color: var(--accent); color: var(--accent); }

  .day-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px 12px;
    border-top: 1px solid var(--border);
  }

  .day-footer .total-label { font-size: 0.68rem; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
  .day-footer .total-val { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; color: var(--red); }

  .reset-day-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 0.65rem;
    cursor: pointer;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
    transition: color 0.15s;
  }
  .reset-day-btn:hover { color: var(--accent); }

  .rollover-badge {
    display: inline-block;
    background: #1e2a1a;
    border: 1px solid var(--accent-dim);
    color: var(--accent);
    font-size: 0.6rem;
    border-radius: 4px;
    padding: 2px 6px;
    letter-spacing: 0.06em;
    margin-left: 6px;
    vertical-align: middle;
  }
  .rollover-badge.neg { background: #2a1a1a; border-color: var(--red); color: var(--red); }

  .undo-toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #0d0f0e;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    padding: 10px 20px;
    border-radius: 20px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  .undo-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <h1>予算 BUDGET</h1>
  <p>BASE JOURNALIÈRE · 3,800 ¥</p>
</header>

<div class="summary-bar">
  <div class="summary-card">
    <div class="label">Total dépensé</div>
    <div class="value" id="totalSpent">0 ¥</div>
  </div>
  <div class="summary-card">
    <div class="label">Solde global</div>
    <div class="value" id="globalBalance">0 ¥</div>
  </div>
</div>

<div class="top-btns">
  <button class="add-day-btn" onclick="addDay()">＋ Nouveau jour</button>
  <button class="undo-btn" id="undoBtn" onclick="undo()" disabled title="Annuler (Ctrl+Z)">↩</button>
</div>

<p class="swipe-hint">← Glisser à gauche pour supprimer un jour ou une dépense</p>

<div id="days-container"></div>
<div class="undo-toast" id="undoToast"></div>

<script>
  const DAILY_BASE = 3800;
  let days = [];
  let history = [];
  const MAX_HISTORY = 30;

  /* ── HISTORY ── */
  function snapshot(label) {
    history.push({ state: JSON.stringify(days), label });
    if (history.length > MAX_HISTORY) history.shift();
    updateUndoBtn();
  }
  function undo() {
    if (!history.length) return;
    const prev = history.pop();
    days = JSON.parse(prev.state);
    saveData(); render(); updateUndoBtn();
    showToast('Annulé : ' + prev.label);
  }
  function updateUndoBtn() {
    document.getElementById('undoBtn').disabled = !history.length;
  }
  function showToast(msg) {
    const t = document.getElementById('undoToast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
  });

  /* ── DATA ── */
  function loadData() {
    try { const s = localStorage.getItem('budget_days'); if (s) days = JSON.parse(s); } catch(e) {}
    if (!days.length) { days.push({ expenses: [] }); saveData(); }
  }
  function saveData() {
    try { localStorage.setItem('budget_days', JSON.stringify(days)); } catch(e) {}
  }

  /* ── CALC ── */
  function getDayLabel(i) {
    const d = new Date();
    d.setDate(d.getDate() - (days.length - 1 - i));
    return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'short' });
  }
  function getDayTotal(i) {
    return days[i].expenses.reduce((s, e) => s + (parseFloat(e.amount) || 0), 0);
  }
  function getDayBudget(i) {
    if (i === 0) return DAILY_BASE;
    return getDayBudget(i - 1) - getDayTotal(i - 1) + DAILY_BASE;
  }

  /* ── ACTIONS ── */
  function addDay() {
    snapshot('Ajout jour ' + (days.length + 1));
    days.push({ expenses: [] }); saveData(); render();
  }
  function deleteDay(i) {
    if (days.length === 1) return;
    snapshot('Suppression jour ' + (i + 1));
    days.splice(i, 1); saveData(); render();
  }
  function resetDay(i) {
    if (!days[i].expenses.length) return;
    snapshot('Remise à zéro jour ' + (i + 1));
    days[i].expenses = []; saveData(); render();
  }
  function addExpense(i) {
    snapshot('Ajout dépense jour ' + (i + 1));
    days[i].expenses.push({ label: '', amount: '' }); saveData(); render();
    setTimeout(() => {
      const rows = document.querySelectorAll(`.day-card[data-day="${i}"] .exp-swipe-wrapper`);
      const last = rows[rows.length - 1];
      if (last) last.querySelector('input[type="text"]').focus();
    }, 50);
  }
  function deleteExpense(di, ei) {
    const exp = days[di].expenses[ei];
    snapshot('Suppression "' + (exp.label || exp.amount + ' ¥') + '"');
    days[di].expenses.splice(ei, 1); saveData(); render();
  }
  function updateExpense(di, ei, field, val) {
    days[di].expenses[ei][field] = val;
    saveData(); renderSummaryAndBars();
  }

  /* ── SWIPE ── */
  function addSwipe(el, threshold, onDelete) {
    const content = el.querySelector('.swipe-content, .exp-swipe-content');
    let startX = 0, startY = 0, swiping = false, confirmed = false, moved = false;

    el.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      swiping = false; confirmed = false; moved = false;
    }, { passive: true });

    el.addEventListener('touchmove', e => {
      const dx = e.touches[0].clientX - startX;
      const dy = e.touches[0].clientY - startY;
      if (!moved) {
        if (Math.abs(dx) < 4 && Math.abs(dy) < 4) return;
        if (Math.abs(dy) > Math.abs(dx)) return; // vertical scroll wins
        swiping = true; moved = true;
      }
      if (!swiping) return;
      const clamped = Math.max(-(threshold + 40), Math.min(0, dx));
      content.style.transition = 'none';
      content.style.transform = `translateX(${clamped}px)`;
      confirmed = dx < -(threshold * 0.55);
    }, { passive: true });

    el.addEventListener('touchend', () => {
      if (!swiping) return;
      content.style.transition = 'transform 0.22s ease';
      if (confirmed) {
        content.style.transform = `translateX(-${threshold + 80}px)`;
        setTimeout(onDelete, 220);
      } else {
        content.style.transform = 'translateX(0)';
      }
    });
  }

  /* ── SUMMARY UPDATE ── */
  function renderSummaryAndBars() {
    let totalSpent = 0;
    days.forEach((d, i) => totalSpent += getDayTotal(i));
    const globalBal = DAILY_BASE * days.length - totalSpent;

    document.getElementById('totalSpent').textContent = totalSpent.toLocaleString('fr-FR') + ' ¥';
    const gbEl = document.getElementById('globalBalance');
    gbEl.textContent = (globalBal >= 0 ? '+' : '') + globalBal.toLocaleString('fr-FR') + ' ¥';
    gbEl.className = 'value' + (globalBal < 0 ? ' negative' : '');

    days.forEach((d, i) => {
      const budget = getDayBudget(i), spent = getDayTotal(i);
      const balance = budget - spent;
      const pct = Math.min(100, Math.max(0, (spent / budget) * 100));
      const card = document.querySelector(`.day-card[data-day="${i}"]`);
      if (!card) return;
      card.querySelector('.bal-value').textContent = (balance >= 0 ? '+' : '') + balance.toLocaleString('fr-FR') + ' ¥';
      card.querySelector('.bal-value').className = 'bal-value ' + (balance >= 0 ? 'positive' : 'negative');
      card.querySelector('.progress-bar-fill').style.cssText = `width:${pct}%;background:${pct>90?'#ff5a5a':pct>65?'#f5a623':'#b8f55a'}`;
      card.querySelector('.meta-budget').textContent = budget.toLocaleString('fr-FR') + ' ¥';
      card.querySelector('.meta-spent').textContent = spent.toLocaleString('fr-FR') + ' ¥';
      card.querySelector('.total-val').textContent = '-' + spent.toLocaleString('fr-FR') + ' ¥';
      const rb = card.querySelector('.rollover-amount');
      if (rb && i > 0) {
        const pb = getDayBudget(i-1) - getDayTotal(i-1);
        rb.textContent = (pb >= 0 ? '+' : '') + pb.toLocaleString('fr-FR') + ' ¥';
        rb.className = 'rollover-badge rollover-amount' + (pb < 0 ? ' neg' : '');
      }
    });
  }

  /* ── FULL RENDER ── */
  function render() {
    const container = document.getElementById('days-container');
    container.innerHTML = '';

    days.forEach((day, di) => {
      const budget = getDayBudget(di), spent = getDayTotal(di);
      const balance = budget - spent;
      const pct = Math.min(100, Math.max(0, (spent / budget) * 100));
      const prevBal = di > 0 ? getDayBudget(di-1) - getDayTotal(di-1) : 0;

      // day swipe wrapper
      const wrap = document.createElement('div');
      wrap.className = 'swipe-wrapper';

      const bg = document.createElement('div');
      bg.className = 'swipe-delete-bg';
      bg.textContent = '🗑 Supprimer le jour';

      const sc = document.createElement('div');
      sc.className = 'swipe-content';

      // day card
      const card = document.createElement('div');
      card.className = 'day-card';
      card.dataset.day = di;

      const rolloverHTML = di > 0
        ? `<span class="rollover-badge rollover-amount${prevBal < 0 ? ' neg' : ''}">${prevBal >= 0 ? '+' : ''}${prevBal.toLocaleString('fr-FR')} ¥</span>`
        : '';

      card.innerHTML = `
        <div class="day-header">
          <div class="day-title">Jour ${di + 1}${rolloverHTML}<span>${getDayLabel(di)}</span></div>
          <div class="day-balance">
            <div class="bal-label">Solde</div>
            <div class="bal-value ${balance >= 0 ? 'positive' : 'negative'}">${balance >= 0 ? '+' : ''}${balance.toLocaleString('fr-FR')} ¥</div>
          </div>
        </div>
        <div class="day-meta">
          <div class="meta-item">Base<strong class="meta-budget">${budget.toLocaleString('fr-FR')} ¥</strong></div>
          <div class="meta-item">Dépensé<strong class="meta-spent">${spent.toLocaleString('fr-FR')} ¥</strong></div>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" style="width:${pct}%;background:${pct>90?'#ff5a5a':pct>65?'#f5a623':'#b8f55a'}"></div>
        </div>
        <div class="expenses-list" id="exp-list-${di}"></div>
        <div class="day-footer">
          <div>
            <div class="total-label">Total dépensé</div>
            <div class="total-val">-${spent.toLocaleString('fr-FR')} ¥</div>
          </div>
          <button class="reset-day-btn" onclick="resetDay(${di})">⟳ Remettre à zéro</button>
        </div>
      `;

      sc.appendChild(card);
      wrap.appendChild(bg);
      wrap.appendChild(sc);
      container.appendChild(wrap);

      if (days.length > 1) addSwipe(wrap, 110, () => deleteDay(di));

      // expenses
      const expList = card.querySelector('#exp-list-' + di);
      day.expenses.forEach((exp, ei) => {
        const ew = document.createElement('div');
        ew.className = 'exp-swipe-wrapper';

        const ebg = document.createElement('div');
        ebg.className = 'exp-delete-bg';
        ebg.textContent = '🗑 Suppr.';

        const ec = document.createElement('div');
        ec.className = 'exp-swipe-content';
        ec.innerHTML = `
          <input type="text" placeholder="Libellé..." value="${escHtml(exp.label)}"
            oninput="days[${di}].expenses[${ei}].label=this.value;saveData();" />
          <input type="number" placeholder="¥" value="${escHtml(String(exp.amount))}"
            oninput="updateExpense(${di},${ei},'amount',this.value);" min="0" step="1" />
        `;

        ew.appendChild(ebg);
        ew.appendChild(ec);
        expList.appendChild(ew);
        addSwipe(ew, 80, () => deleteExpense(di, ei));
      });

      const addBtn = document.createElement('button');
      addBtn.className = 'add-expense-btn';
      addBtn.textContent = '+ Ajouter une dépense';
      addBtn.onclick = () => addExpense(di);
      expList.appendChild(addBtn);
    });

    renderSummaryAndBars();
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadData();
  render();
</script>
</body>
</html>
